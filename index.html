<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Business of Bollywood</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rozha+One&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#1a0d12;--panel:#2a141d;--panel-2:#23121a;
    --ink:#f6ead7;--ink-soft:#cdb59c;--ink-faint:#8d6f63;
    --gold:#e8b84b;--gold-2:#f4cd6b;--rose:#e63e6d;--saffron:#f2884b;--teal:#3aafa9;--loss:#a02f3f;
    --line:#43222e;--line-soft:#351a23;
  }
  *{box-sizing:border-box}html,body{margin:0}
  body{
    background:
      radial-gradient(1200px 600px at 80% -8%, #3a1622 0%, transparent 58%),
      radial-gradient(900px 520px at 2% 104%, #2a0f1a 0%, transparent 55%),
      var(--bg);
    color:var(--ink);font-family:"DM Sans",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;line-height:1.5;padding:clamp(16px,3vw,40px);
  }
  .wrap{max-width:1120px;margin:0 auto}

  /* masthead */
  .eyebrow{font-family:"DM Mono",monospace;font-size:12px;letter-spacing:.32em;text-transform:uppercase;color:var(--gold);display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .eyebrow::before{content:"";width:36px;height:1px;background:var(--gold);opacity:.7}
  .masthead h1{font-family:"Rozha One",serif;font-weight:400;font-size:clamp(38px,7vw,76px);line-height:.95;margin:0 0 16px;letter-spacing:.4px;color:var(--ink)}
  .masthead h1 .accent{color:var(--gold)}
  .masthead .lede{max-width:720px;color:var(--ink-soft);font-size:clamp(15px,1.6vw,18px);margin:0}
  .masthead .lede b{color:var(--ink);font-weight:700}
  .nav{display:flex;flex-wrap:wrap;gap:10px;margin-top:24px}
  .nav a{font-family:"DM Mono",monospace;font-size:12px;letter-spacing:.08em;color:var(--ink-soft);text-decoration:none;background:var(--panel);border:1px solid var(--line);padding:9px 15px;border-radius:999px;transition:color .18s,border-color .18s}
  .nav a:hover{color:var(--gold);border-color:var(--gold)}
  .nav a .num{color:var(--gold);margin-right:7px}

  /* panels */
  .panel{margin-top:clamp(48px,7vw,84px);scroll-margin-top:24px}
  .panel-eyebrow{font-family:"DM Mono",monospace;font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:10px}
  .panel-eyebrow b{color:var(--gold);font-weight:500}
  h2{font-family:"Rozha One",serif;font-weight:400;font-size:clamp(28px,5vw,52px);line-height:1;margin:0 0 14px;color:var(--ink)}
  h2 .accent{color:var(--gold)}
  .panel .lede{max-width:720px;color:var(--ink-soft);font-size:clamp(14.5px,1.5vw,17px);margin:0}
  .panel .lede b{color:var(--ink);font-weight:700}

  .controls{display:flex;flex-wrap:wrap;gap:18px 28px;align-items:flex-end;margin:26px 0 8px;padding-bottom:20px;border-bottom:1px solid var(--line)}
  .ctl-label{font-family:"DM Mono",monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:9px}
  .toggle{display:inline-flex;background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:4px}
  .toggle button{font-family:"DM Sans";font-size:13.5px;font-weight:500;color:var(--ink-soft);background:none;border:none;padding:7px 16px;border-radius:999px;cursor:pointer;transition:color .18s,background .18s}
  .toggle button[aria-pressed="true"]{background:var(--gold);color:#2a1208;font-weight:700}
  .toggle button:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
  .keys{display:flex;gap:18px;align-items:center}
  .key{display:inline-flex;align-items:center;gap:8px;font-family:"DM Mono",monospace;font-size:12px;color:var(--ink-soft)}
  .key .sq{width:13px;height:13px;border-radius:3px;background:linear-gradient(var(--gold-2),var(--gold))}
  .key .ln{width:20px;height:0;border-top:2px solid var(--teal)}
  .legend{display:flex;flex-wrap:wrap;gap:8px}
  .chip{display:inline-flex;align-items:center;gap:8px;cursor:pointer;font-family:"DM Mono",monospace;font-size:12.5px;letter-spacing:.02em;background:var(--panel);border:1px solid var(--line);color:var(--ink-soft);padding:7px 13px 7px 11px;border-radius:999px;transition:opacity .18s,border-color .18s;user-select:none}
  .chip .dot{width:11px;height:11px;border-radius:50%;flex:none}
  .chip[aria-pressed="false"]{opacity:.34;border-color:var(--line-soft)}
  .chip:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
  .trendbtn{font-family:"DM Sans";font-size:13px;font-weight:500;color:var(--ink-soft);background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:8px 15px;cursor:pointer;display:inline-flex;align-items:center;gap:8px}
  .trendbtn[aria-pressed="true"]{color:#2a1208;background:var(--gold);font-weight:700}
  .trendbtn:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
  .hint{font-family:"DM Mono",monospace;font-size:11.5px;color:var(--ink-faint);margin:14px 0 2px}
  .hint b{color:var(--ink-soft);font-weight:500}

  .chart-card{position:relative;margin-top:6px}
  svg{display:block;width:100%;height:auto;overflow:visible}
  .grid line{stroke:var(--line-soft);stroke-width:1}
  .grid line.major{stroke:var(--line)}
  .axis text{fill:var(--ink-faint);font-family:"DM Mono",monospace;font-size:11px}
  .axis-title{fill:var(--ink-soft);font-family:"DM Mono",monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase}

  /* years chart */
  .yearlbl{fill:var(--ink-soft);font-family:"DM Mono",monospace;font-size:12px;font-weight:500}
  .bar{cursor:pointer;transition:filter .18s}
  .bar:hover{filter:brightness(1.12)}
  .barval{fill:var(--ink);font-family:"DM Mono",monospace;font-size:11.5px;font-weight:500;text-anchor:middle;pointer-events:none}
  .totline{fill:none;stroke:var(--teal);stroke-width:2.2;transition:opacity .25s}
  .totdot{fill:var(--bg);stroke:var(--teal);stroke-width:2;transition:opacity .25s}
  .totval{fill:var(--teal);font-family:"DM Mono",monospace;font-size:10.5px;text-anchor:middle;pointer-events:none;transition:opacity .25s}
  .hideline{opacity:0!important}
  .covid-band{fill:var(--rose);opacity:.07}
  .covid-lbl{fill:var(--rose);font-family:"DM Mono",monospace;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;text-anchor:middle;opacity:.85}
  .star{fill:var(--gold)}
  .annote{fill:var(--gold);font-family:"DM Sans";font-size:11px;font-weight:600;text-anchor:middle}
  @keyframes grow{from{transform:scaleY(0)}to{transform:scaleY(1)}}

  /* recovered chart */
  .breakzone{fill:var(--gold);opacity:.05}
  .breaklabel{fill:var(--gold);font-family:"DM Mono",monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;opacity:.7}
  .trend{stroke:var(--gold);stroke-width:1.6;stroke-dasharray:6 5;opacity:.75;fill:none;transition:opacity .25s}
  .trend.off{opacity:0}
  .trend-note{fill:var(--gold);font-family:"DM Sans";font-size:12px;font-style:italic;font-weight:500;transition:opacity .25s}
  .trend-note.off{opacity:0}
  .bubble{cursor:pointer;transition:opacity .25s}
  .bubble:hover{filter:brightness(1.18)}
  .bubble.dim{opacity:.08}
  .bubble.hidden{opacity:0;pointer-events:none}
  .blabel{font-family:"DM Sans";font-size:11px;font-weight:600;fill:var(--ink);pointer-events:none;paint-order:stroke;stroke:var(--bg);stroke-width:3px;stroke-linejoin:round}
  .blabel.sub{fill:var(--ink-faint);font-family:"DM Mono",monospace;font-size:9.5px;font-weight:400}

  /* losers chart */
  .lloss{fill:var(--loss);opacity:.4}
  .lgross{fill:var(--gold)}
  .lloss,.lgross,.lname,.lval{pointer-events:none}
  .lname{fill:var(--ink-soft);font-family:"DM Sans";font-size:12.5px;font-weight:500}
  .lval{fill:var(--ink);font-family:"DM Mono",monospace;font-size:11.5px}
  .lbe{stroke:var(--ink-faint);stroke-width:1;stroke-dasharray:3 4}
  .lbe-lbl{fill:var(--ink-faint);font-family:"DM Mono",monospace;font-size:10px;letter-spacing:.06em}

  /* tooltip (shared) */
  .tip{position:absolute;pointer-events:none;z-index:10;opacity:0;transform:translateY(4px);transition:opacity .12s,transform .12s;background:linear-gradient(#311521,#260f19);border:1px solid var(--gold);border-radius:12px;padding:13px 15px 14px;width:236px;box-shadow:0 18px 40px -16px #000}
  .tip h4{margin:0 0 2px;font-family:"Rozha One",serif;font-weight:400;font-size:19px;line-height:1.05;color:var(--ink)}
  .tip h4.big{font-size:22px;margin-bottom:9px}
  .tip .yr{font-family:"DM Mono",monospace;font-size:11px;color:var(--gold);letter-spacing:.04em;margin-bottom:10px}
  .tip .yr .gpill{color:var(--ink-soft)}
  .tip dl{margin:0;display:grid;grid-template-columns:auto 1fr;gap:5px 10px}
  .tip dt{font-size:12px;color:var(--ink-faint)}
  .tip dd{margin:0;font-family:"DM Mono",monospace;font-size:12.5px;text-align:right;color:var(--ink)}
  .tip dd.gold,.tip .roi{color:var(--gold);font-weight:500}
  .tip dd.teal{color:var(--teal)}
  .tip .verdict,.tip .top{margin-top:10px;font-size:11.5px;color:var(--ink-soft);line-height:1.35;border-top:1px solid var(--line);padding-top:9px}
  .tip .top b,.tip .verdict b{color:var(--ink);font-weight:700}

  footer{margin-top:clamp(40px,6vw,72px);padding-top:22px;border-top:1px solid var(--line);display:flex;flex-wrap:wrap;gap:24px;justify-content:space-between;align-items:flex-start}
  .note{max-width:600px;color:var(--ink-faint);font-size:12.5px;line-height:1.55}
  .note b{color:var(--ink-soft);font-weight:700}
  .panel .note{margin-top:8px}
  .brand{font-family:"DM Mono",monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-faint);text-align:right}
  .brand .g{color:var(--gold)}

  @media (max-width:640px){
    .blabel,.blabel.sub,.barval,.totval{display:none}
    .controls{gap:16px 20px}.keys{gap:12px}
  }
  @media (prefers-reduced-motion:reduce){ *{transition:none!important} .bar{animation:none!important} }
</style>
</head>
<body>
<div class="wrap">
  <header class="masthead">
    <div class="eyebrow">Jayshil's Analytics · A data story</div>
    <h1>The business of Bollywood</h1>
    <p class="lede">There are three ways to follow the money in Hindi cinema, and this page takes all of them.</p>
  </header>

  <section class="panel" id="years">
    <h2>Bollywood by the years</h2>
    <div class="chart-card">
      <svg id="yChart" viewBox="0 0 1000 560"></svg>
    </div>
  </section>

  <section class="panel" id="recovered">
    <h2>By % of budget recovered</h2>
    <div class="chart-card">
      <svg id="rChart" viewBox="0 0 1000 620"></svg>
    </div>
  </section>

  <section class="panel" id="losers">
    <h2>Bollywood's biggest losers</h2>
    <div class="chart-card">
      <svg id="lChart" viewBox="0 0 1000 560"></svg>
    </div>
  </section>
</div>
</body>
</html>
